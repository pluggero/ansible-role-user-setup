---
- name: Manage user directories (Windows)
  ansible.builtin.include_tasks:
    file: noauto_user_directories_Windows.yml
  loop: "{{ user_setup_users }}"
  loop_control:
    loop_var: user
  when:
    - ansible_os_family == 'Windows'
    - user.user_directories is defined
    - user.user_directories | length > 0
    - user.state | default('present') == 'present'
    - user.create_home | default(true)

- name: Manage user directories (Unix)
  ansible.builtin.include_tasks:
    file: noauto_user_directories_Unix.yml
  loop: "{{ user_setup_users }}"
  loop_control:
    loop_var: user
  when:
    - ansible_os_family != 'Windows'
    - user.user_directories is defined
    - user.user_directories | length > 0
    - user.state | default('present') == 'present'
    - user.create_home | default(true)
