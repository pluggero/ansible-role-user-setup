---
- name: Ensure user directories exist
  ansible.windows.win_file:
    path: "{{ getent_passwd[user.name][5] }}\\{{ folder.name }}"
    state: directory
  become: true
  become_method: ansible.builtin.runas
  become_user: SYSTEM
  loop: "{{ user.user_directories }}"
  loop_control:
    loop_var: folder
