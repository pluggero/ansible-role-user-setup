---
- name: Manage user directories
  block:
    - name: Ensure user directories exist
      ansible.builtin.file:
        path: "{{ getent_passwd[user.name][4] }}/{{ folder.name }}"
        state: directory
        mode: "755"
        owner: "{{ user.name }}"
        group: "{{ user_setup_root_group if (getent_passwd[user.name][1] | int == 0) else user.name }}"
      become: true
      loop: "{{ user.user_directories }}"
      loop_control:
        loop_var: folder

    - name: Check if xdg user-dirs file exists
      ansible.builtin.stat:
        path: "{{ getent_passwd[user.name][4] }}/.config/user-dirs.dirs"
      register: user_setup_xdg_file
      become: true

    - name: Ensure xdg user-dirs file exists
      ansible.builtin.file:
        path: "{{ getent_passwd[user.name][4] }}/.config/user-dirs.dirs"
        state: touch
        mode: "600"
        owner: "{{ user.name }}"
        group: "{{ user_setup_root_group if (getent_passwd[user.name][1] | int == 0) else user.name }}"
      become: true
      when: not user_setup_xdg_file.stat.exists

    - name: Ensure xdg user-dirs file is populated
      ansible.builtin.lineinfile:
        path: "{{ getent_passwd[user.name][4] }}/.config/user-dirs.dirs"
        regexp: "^{{ folder.env_var }}="
        line: '{{ folder.env_var }}="{{ getent_passwd[user.name][4] }}/{{ folder.name }}"'
      become: true
      loop: "{{ user.user_directories }}"
      loop_control:
        loop_var: folder
