---
- name: Ensure ssh directory exists
  ansible.windows.win_file:
    path: "{{ getent_passwd[user.name][5] }}\\{{ user.ssh_directory }}"
    state: directory
  become: true
  become_method: ansible.builtin.runas
  become_user: SYSTEM

- name: Remove inheritance on .ssh directory (without reorganizing)
  ansible.windows.win_acl_inheritance:
    path: "{{ getent_passwd[user.name][5] }}\\{{ user.ssh_directory }}"
    state: absent
    reorganize: false
  become: true
  become_method: ansible.builtin.runas
  become_user: SYSTEM

- name: Grant FullControl to user on .ssh directory
  ansible.windows.win_acl:
    path: "{{ getent_passwd[user.name][5] }}\\{{ user.ssh_directory }}"
    user: "{{ user.name }}"
    rights: FullControl
    type: allow
    state: present
    inherit: ContainerInherit, ObjectInherit
    propagation: None
  become: true
  become_method: ansible.builtin.runas
  become_user: SYSTEM

- name: Grant FullControl to SYSTEM on .ssh directory
  ansible.windows.win_acl:
    path: "{{ getent_passwd[user.name][5] }}\\{{ user.ssh_directory }}"
    user: NT AUTHORITY\SYSTEM
    rights: FullControl
    type: allow
    state: present
    inherit: ContainerInherit, ObjectInherit
    propagation: None
  become: true
  become_method: ansible.builtin.runas
  become_user: SYSTEM

- name: Grant FullControl to Administrators on .ssh directory
  ansible.windows.win_acl:
    path: "{{ getent_passwd[user.name][5] }}\\{{ user.ssh_directory }}"
    user: BUILTIN\Administrators
    rights: FullControl
    type: allow
    state: present
    inherit: ContainerInherit, ObjectInherit
    propagation: None
  become: true
  become_method: ansible.builtin.runas
  become_user: SYSTEM

- name: Check if authorized_keys file exists
  ansible.windows.win_stat:
    path: "{{ getent_passwd[user.name][5] }}\\{{ user.ssh_directory }}\\authorized_keys"
  register: user_setup_authorized_keys
  become: true
  become_method: ansible.builtin.runas
  become_user: SYSTEM

- name: Ensure authorized_keys file exists
  ansible.windows.win_file:
    path: "{{ getent_passwd[user.name][5] }}\\{{ user.ssh_directory }}\\authorized_keys"
    state: touch
  become: true
  become_method: ansible.builtin.runas
  become_user: SYSTEM
  when: not user_setup_authorized_keys.stat.exists

- name: Set ACLs on authorized_keys file
  when: not user_setup_authorized_keys.stat.exists
  block:
    - name: Remove inheritance on authorized_keys file (without reorganizing)
      ansible.windows.win_acl_inheritance:
        path: "{{ getent_passwd[user.name][5] }}\\{{ user.ssh_directory }}\\authorized_keys"
        state: absent
        reorganize: false
      become: true
      become_method: ansible.builtin.runas
      become_user: SYSTEM

    - name: Grant FullControl to user on authorized_keys
      ansible.windows.win_acl:
        path: "{{ getent_passwd[user.name][5] }}\\{{ user.ssh_directory }}\\authorized_keys"
        user: "{{ user.name }}"
        rights: FullControl
        type: allow
        state: present
        inherit: None
        propagation: None
      become: true
      become_method: ansible.builtin.runas
      become_user: SYSTEM

    - name: Grant FullControl to SYSTEM on authorized_keys
      ansible.windows.win_acl:
        path: "{{ getent_passwd[user.name][5] }}\\{{ user.ssh_directory }}\\authorized_keys"
        user: NT AUTHORITY\SYSTEM
        rights: FullControl
        type: allow
        state: present
        inherit: None
        propagation: None
      become: true
      become_method: ansible.builtin.runas
      become_user: SYSTEM

    - name: Grant FullControl to Administrators on authorized_keys
      ansible.windows.win_acl:
        path: "{{ getent_passwd[user.name][5] }}\\{{ user.ssh_directory }}\\authorized_keys"
        user: BUILTIN\Administrators
        rights: FullControl
        type: allow
        state: present
        inherit: None
        propagation: None
      become: true
      become_method: ansible.builtin.runas
      become_user: SYSTEM

- name: Manage authorized_keys in exclusive mode
  when: user.ssh_authorized_keys_exclusive | default(false)
  block:
    - name: Create temporary directory for temp file
      ansible.windows.win_tempfile:
        state: directory
        suffix: _ssh_keys
      register: user_setup_temp_dir
      become: true
      become_method: ansible.builtin.runas
      become_user: SYSTEM
      changed_when: false

    - name: Build temp authorized_keys file
      community.windows.win_lineinfile:
        path: "{{ user_setup_temp_dir.path }}\\authorized_keys"
        line: "{{ (key_entry.options | default('') ~ ' ' if key_entry.options is defined else '') ~ key_entry.key }}"
        create: true
      loop: "{{ user.ssh_authorized_keys }}"
      loop_control:
        loop_var: key_entry
      become: true
      become_method: ansible.builtin.runas
      become_user: SYSTEM
      changed_when: false

    - name: Copy temp file to replace authorized_keys
      ansible.windows.win_copy:
        src: "{{ user_setup_temp_dir.path }}\\authorized_keys"
        dest: "{{ getent_passwd[user.name][5] }}\\{{ user.ssh_directory }}\\authorized_keys"
        remote_src: true
      become: true
      become_method: ansible.builtin.runas
      become_user: SYSTEM

    - name: Clean up temporary directory
      ansible.windows.win_file:
        path: "{{ user_setup_temp_dir.path }}"
        state: absent
      become: true
      become_method: ansible.builtin.runas
      become_user: SYSTEM
      changed_when: false

- name: Ensure authorized_keys file is populated (non-exclusive mode)
  community.windows.win_lineinfile:
    path: "{{ getent_passwd[user.name][5] }}\\{{ user.ssh_directory }}\\authorized_keys"
    line: "{{ (key_entry.options | default('') ~ ' ' if key_entry.options is defined else '') ~ key_entry.key }}"
  become: true
  become_method: ansible.builtin.runas
  become_user: SYSTEM
  loop: "{{ user.ssh_authorized_keys }}"
  loop_control:
    loop_var: key_entry
  when: not (user.ssh_authorized_keys_exclusive | default(false))
